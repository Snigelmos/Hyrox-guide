name: Scheduled publish

on:
  # Runs every other day at 07:00 UTC (09:00 Stockholm time)
  # Covers the Apr 23 → May 7 Station Masterclass drip cadence,
  # and keeps running indefinitely for future scheduled content.
  schedule:
    - cron: "0 7 */2 * *"

  # Allow a manual trigger from the GitHub Actions UI at any time
  workflow_dispatch:

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel rebuild
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            --fail \
            --retry 3 \
            --retry-delay 10
