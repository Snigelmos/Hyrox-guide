name: Race results reminder

# Keeps finished races from getting stuck on "Race report being compiled".
#
# Unlike venue maps (low-risk, auto-committed by scan-venue-maps.yml), podium
# results are editorial and occasionally messy — an official rank 1 can be
# vacant after a post-race disqualification (Lyon 2026 Pro Women did exactly
# this), so the scraped top-3 must be eyeballed by a human before publishing.
#
# This job runs scripts/fetch-race-podiums.mjs --pending (every past event with
# no entry in src/data/event-results.ts), and when it finds podium data that's
# ready to paste, it opens or updates ONE GitHub issue containing the
# ready-to-paste TS blocks. Paste, QA, commit — done. It never writes to the
# repo itself, so wrong/incomplete results can never auto-deploy.

on:
  # Mondays 07:00 UTC — most weekends' results are settled by then.
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

concurrency:
  group: race-results-reminder
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Collect pending race podiums
        id: collect
        run: |
          node scripts/fetch-race-podiums.mjs --pending > podiums.txt 2>&1 || true
          # Only act when at least one division block was actually parsed
          # (i.e. there is something ready to paste). "no division data" lines
          # alone — races not yet published — are not worth an issue.
          if grep -q "division:" podiums.txt; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "No new race results ready to add."
          fi

      - name: Open or update reminder issue
        if: steps.collect.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TITLE="Race results to add to event-results.ts"
          {
            echo "Finished races below have podium data ready on hyresult but no entry in \`src/data/event-results.ts\`, so the live page and results pages still say \"Race report being compiled\"."
            echo ""
            echo "Paste each block into \`RACE_RESULTS\` (chronological order), fill the TODO notes/takeaways, eyeball any \`CHECK rank\` warnings, then commit."
            echo ""
            echo '```ts'
            cat podiums.txt
            echo '```'
            echo ""
            echo "_Auto-generated by the Race results reminder workflow. Re-run locally with \`node scripts/fetch-race-podiums.mjs --pending\`._"
          } > body.md

          EXISTING=$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --body-file body.md
            echo "Updated issue #$EXISTING."
          else
            gh issue create --title "$TITLE" --body-file body.md
            echo "Opened a new reminder issue."
          fi
